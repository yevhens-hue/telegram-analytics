services:
  app:
    build: .
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@db:5432/analytics
      - TONAPI_KEY=${TONAPI_KEY:-}
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
      - APP_ENV=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./analytics.db:/app/analytics.db

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    environment:
      - POSTGRES_URL=postgresql://postgres:postgres@db:5432/analytics
      - ANALYTICS_DB=/data/analytics.db
    depends_on:
      - db
    volumes:
      - ./analytics.db:/data/analytics.db:ro

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
